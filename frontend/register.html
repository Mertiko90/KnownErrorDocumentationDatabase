<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — KEDB Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue-50: #E6F1FB; --blue-600: #185FA5; --blue-800: #0C447C;
      --red-50: #FCEBEB; --red-800: #A32D2D;
      --green-50: #EAF3DE; --green-800: #3B6D11;
      --radius-md: 8px; --radius-lg: 12px;
    }
    body { font-family: 'DM Sans', sans-serif; background: #fff; color: #1a1a1a; min-height: 100vh; display: flex; flex-direction: column; }
    a { text-decoration: none; color: inherit; }
    nav { max-width: 900px; margin: 0 auto; padding: 1.5rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid #e0e0e0; width: 100%; }
    .logo { font-family: 'DM Serif Display', serif; font-size: 20px; letter-spacing: -0.5px; }
    .logo span { color: var(--blue-600); }
    .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 3rem 1.5rem; }
    .card { width: 100%; max-width: 420px; border: 0.5px solid #e0e0e0; border-radius: var(--radius-lg); padding: 2.5rem; background: #fff; }
    .card-tag { display: inline-block; background: var(--blue-50); color: var(--blue-600); font-size: 11px; font-weight: 500; padding: 4px 12px; border-radius: 100px; margin-bottom: 1rem; letter-spacing: 0.5px; text-transform: uppercase; }
    .card-title { font-family: 'DM Serif Display', serif; font-size: 26px; margin-bottom: 0.4rem; }
    .card-sub { font-size: 13px; color: #777; margin-bottom: 2rem; }
    .form-group { margin-bottom: 1.25rem; }
    label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: #333; }
    input { width: 100%; padding: 9px 12px; border: 0.5px solid #d0d0d0; border-radius: var(--radius-md); font-size: 14px; font-family: 'DM Sans', sans-serif; background: #fff; color: #1a1a1a; outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
    input:focus { border-color: var(--blue-600); box-shadow: 0 0 0 3px var(--blue-50); }
    input::placeholder { color: #bbb; }
    .btn-submit { width: 100%; padding: 10px; background: var(--blue-600); color: #fff; border: none; border-radius: var(--radius-md); font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: background 0.15s; margin-top: 0.5rem; }
    .btn-submit:hover { background: var(--blue-800); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .divider { border: none; border-top: 0.5px solid #e0e0e0; margin: 1.5rem 0; }
    .footer-link { font-size: 13px; color: #777; text-align: center; }
    .footer-link a { color: var(--blue-600); font-weight: 500; }
    .footer-link a:hover { text-decoration: underline; }
    .error-box { background: var(--red-50); color: var(--red-800); border: 0.5px solid #f5c6c6; border-radius: var(--radius-md); padding: 10px 14px; font-size: 13px; margin-bottom: 1.25rem; display: none; }
    .error-box.visible { display: block; }
    .success-box { background: var(--green-50); color: var(--green-800); border: 0.5px solid #b6d98a; border-radius: var(--radius-md); padding: 10px 14px; font-size: 13px; margin-bottom: 1.25rem; display: none; }
    .success-box.visible { display: block; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hint { font-size: 11px; color: #aaa; margin-top: 4px; }
    footer { border-top: 0.5px solid #e0e0e0; padding: 1.25rem 1.5rem; display: flex; justify-content: space-between; align-items: center; max-width: 900px; margin: 0 auto; width: 100%; }
    .footer-logo { font-family: 'DM Serif Display', serif; font-size: 14px; }
    .footer-logo span { color: var(--blue-600); }
    .footer-copy { font-size: 12px; color: #aaa; }
  </style>
</head>
<body>
  <nav>
    <a href="/index.html"><div class="logo">KEDB<span>.</span>portal</div></a>
  </nav>

  <div class="main">
    <div class="card">
      <span class="card-tag">IT Knowledge Base</span>
      <div class="card-title">Create an account</div>
      <div class="card-sub">Join your team's knowledge base</div>

      <div class="error-box" id="errorBox"></div>
      <div class="success-box" id="successBox"></div>

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="john.doe" autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="john@company.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="new-password" />
        <div class="hint">Minimum 8 characters</div>
      </div>
      <div class="form-group">
        <label for="password2">Confirm password</label>
        <input type="password" id="password2" placeholder="••••••••" autocomplete="new-password" />
      </div>

      <button class="btn-submit" id="registerBtn" onclick="handleRegister()">Create account</button>

      <hr class="divider" />
      <div class="footer-link">Already have an account? <a href="/login.html">Sign in</a></div>
    </div>
  </div>

  <footer>
    <div class="footer-logo">KEDB<span>.</span>portal</div>
    <div class="footer-copy">IT Administration &amp; Cyber Security Project · 2025</div>
  </footer>

  <script>
    const API = '';

    if (localStorage.getItem('token')) window.location.href = '/dashboard.html';

    document.getElementById('password2').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleRegister();
    });

    async function handleRegister() {
      const username = document.getElementById('username').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const password2 = document.getElementById('password2').value;
      const btn = document.getElementById('registerBtn');

      hideMessages();

      if (!username || !email || !password || !password2) { showError('Please fill in all fields.'); return; }
      if (password.length < 8) { showError('Password must be at least 8 characters.'); return; }
      if (password !== password2) { showError('Passwords do not match.'); return; }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Creating account…';

      try {
        const res = await fetch(`${API}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password })
        });
        const data = await res.json();
        if (!res.ok) { showError(data.detail || 'Registration failed.'); return; }
        showSuccess('Account created! Redirecting to login…');
        setTimeout(() => window.location.href = '/login.html', 1500);
      } catch (err) {
        showError('Could not reach the server. Is the backend running?');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create account';
      }
    }

    function showError(msg)   { const b = document.getElementById('errorBox');   b.textContent = msg; b.classList.add('visible'); }
    function showSuccess(msg) { const b = document.getElementById('successBox'); b.textContent = msg; b.classList.add('visible'); }
    function hideMessages()   { document.getElementById('errorBox').classList.remove('visible'); document.getElementById('successBox').classList.remove('visible'); }
  </script>
</body>
</html>
